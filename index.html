<!doctype html>
<html lang="uk">
  <head>
    <!-- 📄 Кодування сторінки -->
    <meta charset="UTF-8" />

    <!-- 📱 Адаптивність -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 🔍 SEO -->
    <title>Junior Frontend Developer Portfolio | Vitalii Baranov</title>
    <meta
      name="description"
      content="Modern frontend developer portfolio: React, TypeScript, responsive layout, UX/UI design, and creative web solutions."
    />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Vitalii Baranov" />
    <link
      rel="canonical"
      href="https://portfolio-frontend-react-flax.vercel.app/"
    />

    <!-- 🌟 Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png?v=2" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- 📱 Open Graph -->
    <meta
      property="og:title"
      content="Junior Frontend Developer Portfolio | Vitalii Baranov"
    />
    <meta
      property="og:description"
      content="Explore my projects built with React, TypeScript, and HTML/CSS"
    />
    <meta property="og:image" content="/preview.png" />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://portfolio-frontend-react-flax.vercel.app/"
    />

    <!-- 🚀 Preload LCP-зображення -->
    <link
      rel="preload"
      as="image"
      href="/images/686.webp"
      fetchpriority="high"
    />

    <!-- 🌐 Локалізація -->
    <meta http-equiv="Content-Language" content="uk" />
    <link
      rel="alternate"
      hreflang="uk"
      href="https://portfolio-frontend-react-flax.vercel.app/ua"
    />
    <link
      rel="alternate"
      hreflang="en"
      href="https://portfolio-frontend-react-flax.vercel.app/en"
    />
    <link
      rel="alternate"
      hreflang="cs"
      href="https://portfolio-frontend-react-flax.vercel.app/cz"
    />

    <!-- 🎨 Шрифт Manrope (неблокуюче завантаження) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;600;800&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;600;800&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;600;800&display=swap"
      />
    </noscript>
  </head>

  <body>
